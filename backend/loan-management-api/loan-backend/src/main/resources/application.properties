spring.application.name=LoanSaaS-Pro
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never

# ======== POSTGRESQL (production) ========
# No defaults on purpose — startup fails loudly if DB_URL/DB_USERNAME/DB_PASSWORD aren't set,
# rather than silently falling back to a hardcoded credential. Matches the env var names
# docker-compose.yml already passes to this service.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ======== FLYWAY MIGRATIONS ========
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ======== CONNECTION POOL (HikariCP) ========
spring.datasource.hikari.pool-name=LoanSaaS-Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ======== JWT ========
# JWT signing secret — REQUIRED, no fallback. A hardcoded default here would mean
# any deployment that forgets to set JWT_SECRET silently signs tokens with a secret
# published in this repo's source history, letting anyone forge valid staff/borrower
# tokens. Startup fails instead if JWT_SECRET is not set.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ======== CORS ========
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost}

# ======== OPENAPI ========
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ======== ACTUATOR (health checks) ========
management.endpoints.web.exposure.include=health,info,metrics,flyway
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
info.app.name=LoanSaaS Pro
info.app.version=2.0.0

# ======== MAIL ========
# File uploads (KYC documents: national ID, certificates, bank statements, selfie).
# BorrowerFileService additionally caps each individual file at 8MB and validates
# content-type — these are just the servlet-level ceilings.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=50MB

# ======== MAIL ========
# No default credentials here on purpose. MAIL_USERNAME/MAIL_PASSWORD must be set as real
# environment variables (Docker secret, platform config var, secrets manager, etc.) or mail
# silently won't authenticate. This previously shipped with a real Gmail App Password hardcoded
# as the fallback default — if you deployed any earlier build of this repo, that credential was
# exposed to anyone who could read this file (including this being pasted into any AI tool,
# uploaded anywhere, or committed to a repo). Treat it as compromised: revoke it now at
# https://myaccount.google.com/apppasswords, then set a fresh MAIL_PASSWORD via your real secrets
# mechanism — never back in this file.
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT:2525}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Custom application parameter toggles
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:pmpumuropizzou@gmail.com}

# ======== FLUTTERWAVE ========
flutterwave.secret-key=${FLUTTERWAVE_SECRET_KEY:}
flutterwave.public-key=${FLUTTERWAVE_PUBLIC_KEY:}
flutterwave.base-url=https://api.flutterwave.com/v3
# Set this to the same "Secret Hash" configured in your Flutterwave dashboard's webhook settings —
# it's how we verify a webhook call genuinely came from Flutterwave and not an attacker.
flutterwave.webhook-secret=${FLUTTERWAVE_WEBHOOK_SECRET:}

# ======== FX RATES ========
app.openexchangerates.app-id=${OXR_APP_ID:}

# ======== LOGGING ========
# Log format/output is now controlled by logback-spring.xml (JSON in prod, plain console in
# dev) so it can attach the request ID from RequestIdFilter to every line. logging.level.*
# below still applies on top of that regardless of profile.
logging.level.com.patrick.fintech=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# ======== JACKSON (prevents ByteBuddyInterceptor serialization error) ========
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=NON_NULL

# ======== SMS NOTIFICATIONS ========
app.sms.enabled=${SMS_ENABLED:false}
app.sms.africas-talking.api-key=${AT_API_KEY:}
app.sms.africas-talking.username=${AT_USERNAME:sandbox}
app.sms.africas-talking.sender-id=${AT_SENDER_ID:LoanSaaS}
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}

# ======== SCHEDULING ========
app.scheduler.overdue-check-cron=${OVERDUE_CRON:0 0 7 * * *}
app.scheduler.fx-refresh-cron=${FX_REFRESH_CRON:0 0 2 * * *}

# ======== CREDIT BUREAU ========
# When disabled (default), checks are answered by a deterministic internal
# estimate derived from the borrower's own profile — no external call is made.
# Point this at a real BNR-licensed CRB (e.g. TransUnion Rwanda) in production.
app.credit-bureau.enabled=${CREDIT_BUREAU_ENABLED:false}
app.credit-bureau.provider=${CREDIT_BUREAU_PROVIDER:INTERNAL_SIMULATED}
app.credit-bureau.base-url=${CREDIT_BUREAU_BASE_URL:}
app.credit-bureau.api-key=${CREDIT_BUREAU_API_KEY:}

# ======== ASYNC THREAD POOL ========
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.scheduling.pool.size=4

# ======== JACKSON ========