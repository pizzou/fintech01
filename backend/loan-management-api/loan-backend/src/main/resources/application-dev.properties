# DEV PROFILE — uses H2 in-memory (no PostgreSQL needed)
spring.datasource.url=jdbc:h2:mem:loansaasdev;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=false
logging.level.com.patrick.fintech=DEBUG
logging.level.org.springframework.security=DEBUG
app.mail.enabled=false
# Dev-only signing key (never used for staging/prod — those require JWT_SECRET to be set,
# see application.properties). Fine to be predictable here since dev runs on H2 in-memory
# with no real borrower data.
app.jwt.secret=${JWT_SECRET:dev-only-insecure-key-do-not-use-in-any-real-deployment-min-64-bytes-required}
